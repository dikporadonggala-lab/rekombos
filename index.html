<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Rekomendasi BOS - Donggala</title>
    
    <!-- Memuat Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memuat React dan ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Memuat Babel untuk mengkompilasi JSX di Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Animasi kustom ringan */
        @keyframes bounce-short {
            0%, 100% { transform: translateY(-3%); }
            50% { transform: translateY(0); }
        }
        .animate-bounce-short {
            animation: bounce-short 0.5s ease-in-out;
        }
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body>
    <!-- Wadah untuk Aplikasi React -->
    <div id="root"></div>

    <!-- Script Aplikasi Utama -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Definisi Icon (menggantikan import lucide-react) ---
        const IconSvg = ({ size = 24, className = "", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const LogOut = ({ size, className }) => <IconSvg size={size} className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></IconSvg>;
        const LayoutDashboard = ({ size, className }) => <IconSvg size={size} className={className}><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></IconSvg>;
        const FileText = ({ size, className }) => <IconSvg size={size} className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></IconSvg>;
        const Plus = ({ size, className }) => <IconSvg size={size} className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconSvg>;
        const Search = ({ size, className }) => <IconSvg size={size} className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconSvg>;
        const Save = ({ size, className }) => <IconSvg size={size} className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></IconSvg>;
        const TrendingUp = ({ size, className }) => <IconSvg size={size} className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></IconSvg>;
        const School = ({ size, className }) => <IconSvg size={size} className={className}><path d="M14 22v-4a2 2 0 1 0-4 0v4"/><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/><path d="M18 5v17"/><path d="m4 6 8-4 8 4"/><path d="M6 5v17"/><circle cx="12" cy="9" r="2"/></IconSvg>;
        const Printer = ({ size, className }) => <IconSvg size={size} className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></IconSvg>;
        const ChevronRight = ({ size, className }) => <IconSvg size={size} className={className}><polyline points="9 18 15 12 9 6"/></IconSvg>;
        const ImagePlus = ({ size, className }) => <IconSvg size={size} className={className}><path d="M21 11.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7.5"/><path d="M21 15v6"/><path d="M18 18h6"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></IconSvg>;

        // --- Konfigurasi Aplikasi ---
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbxKAmzEZOZk4z-zCqEC-UZ8M1MbO-0K8ix_pmicnMUresf574py2YfZStEgDgS8xphT/exec";

        // --- Komponen Utama ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [currentPage, setCurrentPage] = useState('login');
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [password, setPassword] = useState('admin123');
            const [message, setMessage] = useState({ type: '', text: '' });
            const [logoUrl, setLogoUrl] = useState("https://upload.wikimedia.org/wikipedia/commons/c/c5/Logo_Kabupaten_Donggala.png");

            const [formData, setFormData] = useState({
                nomorSurat: '',
                tanggalSurat: '',
                namaSekolah: '',
                tahap: 'Tahap 1',
                kategoriBos: 'Bos Reguler',
                pagu: 0,
                belanjaModal: 0
            });

            const fetchData = async () => {
                setLoading(true);
                try {
                    const response = await fetch(GOOGLE_SHEET_URL);
                    const result = await response.json();
                    if (result.status === 'success') {
                        setData(result.data || []);
                    }
                } catch (error) {
                    console.error("Gagal mengambil data:", error);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                if (user) fetchData();
            }, [user]);

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setLogoUrl(event.target.result);
                    };
                    reader.readAsDataURL(file);
                    setMessage({ type: 'success', text: 'Logo berhasil diperbarui!' });
                    setTimeout(() => setMessage({ type: '', text: '' }), 3000);
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (e.target.username.value === 'admin' && e.target.password.value === password) {
                    setUser({ name: 'Administrator' });
                    setCurrentPage('dashboard');
                } else {
                    setMessage({ type: 'error', text: 'Username atau Password salah' });
                }
            };

            const handleSubmitData = async (e) => {
                e.preventDefault();
                setLoading(true);
                const totalValue = parseFloat(formData.pagu || 0) - parseFloat(formData.belanjaModal || 0);
                const submissionData = { ...formData, total: totalValue };

                try {
                    await fetch(GOOGLE_SHEET_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(submissionData)
                    });
                    
                    setMessage({ type: 'success', text: 'Data berhasil disimpan ke Cloud!' });
                    setFormData({
                        nomorSurat: '', tanggalSurat: '', namaSekolah: '', 
                        tahap: 'Tahap 1', kategoriBos: 'Bos Reguler', 
                        pagu: 0, belanjaModal: 0
                    });
                    
                    setTimeout(fetchData, 2000);
                    setTimeout(() => setMessage({ type: '', text: '' }), 4000);
                } catch (error) {
                    setMessage({ type: 'error', text: 'Gagal mengirim data' });
                } finally {
                    setLoading(false);
                }
            };

            const printDocument = (item) => {
                const printWindow = window.open('', '_blank', 'width=850,height=950');
                
                const htmlContent = `
                <html>
                    <head>
                    <title>Cetak Rekomendasi - ${item["Nama Sekolah"]}</title>
                    <style>
                        @page { size: A4; margin: 1.5cm 2cm; }
                        body { font-family: "Times New Roman", serif; line-height: 1.2; color: black; padding: 0; margin: 0; }
                        
                        /* CSS UNTUK KOP SURAT SEMPURNA */
                        .header-container { 
                        display: flex; 
                        align-items: center; 
                        border-bottom: 4px double black; 
                        padding-bottom: 8px; 
                        margin-bottom: 15px; 
                        width: 100%;
                        }
                        .logo-wrapper {
                        flex: 0 0 80px; 
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        }
                        .logo-img { 
                        width: 75px; 
                        height: auto; 
                        object-fit: contain;
                        }
                        .text-wrapper {
                        flex: 1;
                        text-align: center;
                        padding-right: 75px; 
                        }
                        
                        .header-text h2 { margin: 0; font-size: 14pt; text-transform: uppercase; font-weight: bold; }
                        .header-text h1 { margin: 0; font-size: 16pt; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
                        .header-text p { margin: 2px 0 0 0; font-size: 10pt; font-style: normal; }
                        
                        .title-area { text-align: center; margin-bottom: 25px; margin-top: 10px; }
                        .title-area h3 { margin: 0; font-size: 14pt; text-decoration: underline; text-transform: uppercase; font-weight: bold; }
                        .content { text-align: justify; font-size: 12pt; line-height: 1.5; }
                        .indent { text-indent: 50px; margin-bottom: 12px; }
                        .data-table { width: 100%; margin: 15px 0 15px 50px; border-collapse: collapse; }
                        .data-table td { padding: 4px 0; vertical-align: top; }
                        .ttd-container { display: flex; justify-content: flex-end; margin-top: 40px; }
                        .ttd-box { width: 350px; text-align: left; }
                        .bold { font-weight: bold; }
                        .uppercase { text-transform: uppercase; }
                    </style>
                    </head>
                    <body onload="setTimeout(() => { window.print(); window.close(); }, 800);">
                    <div class="header-container">
                        <div class="logo-wrapper">
                        <img src="${logoUrl}" class="logo-img" alt="Logo" onerror="this.onerror=null; this.src='https://placehold.co/75x100?text=Logo+Gagal';" />
                        </div>
                        <div class="text-wrapper">
                        <div class="header-text">
                            <h2>Pemerintah Kabupaten Donggala</h2>
                            <h1>Dinas Pendidikan Pemuda dan Olahraga</h1>
                            <p>Alamat : Jl. Jati Baru Gunung Bale Telp. (0457) 71775, 71885, 71880</p>
                        </div>
                        </div>
                    </div>

                    <div class="title-area">
                        <h3>R E K O M E N D A S I</h3>
                        <div style="font-weight: bold;">Nomor : ${item["Nomor Surat"] || '...........................'}</div>
                    </div>

                    <div class="content">
                        <p class="indent">Sehubungan telah terpenuhinya syarat-syarat pencairan Dana ${item["Kategori BOS"] || 'BOS Reguler'} sesuai dengan Petunjuk Teknis Penggunaan Dana ${item["Kategori BOS"] || 'BOS Reguler'} Tahun 2025, selaku Kepala Dinas Pendidikan Pemuda dan Olahraga Kabupaten Donggala merekomendasikan kepada BANK Pembangunan Daerah (BPD) Sulawesi Tengah untuk mencairkan Dana ${item["Kategori BOS"] || 'BOS Reguler'} kepada :</p>
                        
                        <table class="data-table">
                        <tr><td width="180">Sekolah</td><td width="20">:</td><td class="bold uppercase">${item["Nama Sekolah"]}</td></tr>
                        <tr><td>Kategori BOS</td><td>:</td><td>${item["Kategori BOS"]}</td></tr>
                        <tr><td>Pagu ${item["Kategori BOS"]}</td><td>:</td><td>Rp ${parseFloat(item["Pagu"] || 0).toLocaleString('id-ID')}</td></tr>
                        <tr><td>Belanja Modal</td><td>:</td><td>Rp ${parseFloat(item["Belanja Modal"] || 0).toLocaleString('id-ID')}</td></tr>
                        <tr><td>Total</td><td>:</td><td class="bold"><span style="border-bottom: 2px solid black; padding-bottom: 2px;">Rp ${parseFloat(item["Total"] || 0).toLocaleString('id-ID')}</span></td></tr>
                        </table>

                        <p class="indent">Demikian Rekomendasi ini diberikan kepada yang bersangkutan untuk digunakan sebagaimana mestinya.</p>
                    </div>

                    <div class="ttd-container">
                        <div class="ttd-box">
                        <p>Donggala, ${item["Tanggal Surat"] ? new Date(item["Tanggal Surat"]).toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'}) : '..................'}</p>
                        <div style="margin-bottom: 80px;">
                            <p style="margin:0">An. Plt Kepala Dinas Pendidikan Pemuda</p>
                            <p style="margin:0">dan Olahraga Kabupaten Donggala,</p>
                            <p style="margin:0; font-size: 11pt;">Kasi Peserta Didik dan Pembinaan Karakter</p>
                        </div>
                        <p class="bold uppercase" style="margin:0; text-decoration: underline;">TRI SATYANI, S.P</p>
                        <p style="margin:0; font-size: 11pt;">NIP: 19740827 200904 2 001</p>
                        </div>
                    </div>
                    </body>
                </html>
                `;

                printWindow.document.write(htmlContent);
                printWindow.document.close();
            };

            if (!user) {
                return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                    <div className="p-8 bg-blue-700 text-white text-center">
                        <h1 className="text-3xl font-black italic">REKOM-BOS</h1>
                        <p className="text-sm opacity-80 mt-1 uppercase font-bold tracking-tighter">Dinas Pendidikan Pemuda dan Olahraga</p>
                    </div>
                    <div className="p-8">
                        {message.text && <div className={`mb-4 p-3 rounded-lg text-sm font-bold ${message.type === 'error' ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`}>{message.text}</div>}
                        <form onSubmit={handleLogin} className="space-y-4">
                        <input name="username" type="text" placeholder="Username" className="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500" />
                        <input name="password" type="password" placeholder="Password" className="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500" />
                        <button className="w-full py-4 bg-blue-600 text-white font-black rounded-xl hover:bg-blue-700 transition-all flex items-center justify-center gap-2">LOGIN SISTEM <ChevronRight size={20}/></button>
                        </form>
                    </div>
                    </div>
                </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col md:flex-row">
                <aside className="w-full md:w-64 bg-white border-r flex flex-col">
                    <div className="p-6 font-black text-2xl text-blue-700 border-b italic uppercase">Rekom-Bos</div>
                    <nav className="p-4 flex-1 space-y-2">
                    <button onClick={() => setCurrentPage('dashboard')} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${currentPage==='dashboard'?'bg-blue-600 text-white shadow-lg font-bold':'text-gray-500 hover:bg-gray-100'}`}><LayoutDashboard size={20}/> Dashboard</button>
                    <button onClick={() => setCurrentPage('input')} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${currentPage==='input'?'bg-blue-600 text-white shadow-lg font-bold':'text-gray-500 hover:bg-gray-100'}`}><Plus size={20}/> Input Baru</button>
                    <button onClick={() => setCurrentPage('data')} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${currentPage==='data'?'bg-blue-600 text-white shadow-lg font-bold':'text-gray-500 hover:bg-gray-100'}`}><FileText size={20}/> Riwayat Data</button>
                    
                    <div className="pt-4 mt-4 border-t">
                        <label className="w-full flex items-center gap-3 p-3 rounded-xl transition-all text-gray-500 hover:bg-gray-100 cursor-pointer">
                        <ImagePlus size={20}/>
                        <span className="text-sm font-semibold">Ganti Logo Kop</span>
                        <input type="file" accept="image/*" onChange={handleLogoUpload} className="hidden" />
                        </label>
                    </div>
                    </nav>
                    <button onClick={() => setUser(null)} className="p-6 text-red-500 font-bold border-t flex items-center gap-2 hover:bg-red-50 transition-all"><LogOut size={20}/> Keluar</button>
                </aside>

                <main className="flex-1 p-4 md:p-8 overflow-y-auto">
                    <header className="mb-8 flex flex-col md:flex-row justify-between items-center gap-4 border-b pb-4">
                    <h2 className="text-3xl font-black text-gray-800 uppercase italic">{currentPage === 'dashboard' ? 'Overview' : currentPage === 'input' ? 'Input Data' : 'Riwayat'}</h2>
                    {currentPage === 'data' && (
                        <div className="relative w-full md:w-80">
                        <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={18}/>
                        <input type="text" placeholder="Cari sekolah..." className="w-full pl-10 pr-4 py-2 bg-white border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 shadow-sm" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} />
                        </div>
                    )}
                    </header>

                    {message.text && (
                    <div className={`mb-6 p-4 rounded-xl text-sm font-bold shadow-md animate-bounce-short ${message.type === 'error' ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-green-50 text-green-600 border border-green-100'}`}>
                        {message.text}
                    </div>
                    )}

                    {currentPage === 'dashboard' && (
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-l-blue-600 flex items-center gap-4">
                        <div className="bg-blue-100 p-4 rounded-xl text-blue-600"><School size={28}/></div>
                        <div><p className="text-xs font-bold text-gray-400 uppercase">Total Sekolah</p><p className="text-3xl font-black">{data.length}</p></div>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-l-green-600 flex items-center gap-4">
                        <div className="bg-green-100 p-4 rounded-xl text-green-600"><TrendingUp size={28}/></div>
                        <div><p className="text-xs font-bold text-gray-400 uppercase">Total Dana Cair</p><p className="text-xl font-black">Rp {data.reduce((a,b)=>a+(parseFloat(b.Total)||0),0).toLocaleString('id-ID')}</p></div>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-l-indigo-600 flex items-center gap-4">
                        <div className="bg-indigo-100 p-4 rounded-xl text-indigo-600"><Save size={28}/></div>
                        <div><p className="text-xs font-bold text-gray-400 uppercase">Status Sistem</p><p className="text-lg font-black text-green-600 uppercase italic">Online</p></div>
                        </div>
                    </div>
                    )}

                    {currentPage === 'input' && (
                    <div className="bg-white rounded-3xl shadow-xl border max-w-4xl mx-auto overflow-hidden">
                        <div className="bg-blue-700 p-6 text-white">
                        <h3 className="text-xl font-black uppercase italic tracking-wider">Form Rekomendasi Baru</h3>
                        <p className="text-xs opacity-70">DINAS PENDIDIKAN PEMUDA DAN OLAHRAGA</p>
                        </div>
                        <form onSubmit={handleSubmitData} className="p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="space-y-5">
                            <div>
                            <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-tight">Nomor Surat</label>
                            <input required type="text" className="w-full p-3.5 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium" value={formData.nomorSurat} onChange={e=>setFormData({...formData, nomorSurat: e.target.value})} placeholder="Contoh: 800/123/DISDIKPORA" />
                            </div>
                            <div>
                            <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-tight">Tanggal Surat</label>
                            <input required type="date" className="w-full p-3.5 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium" value={formData.tanggalSurat} onChange={e=>setFormData({...formData, tanggalSurat: e.target.value})} />
                            </div>
                            <div>
                            <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-tight">Nama Sekolah</label>
                            <input required type="text" className="w-full p-3.5 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all font-black uppercase" value={formData.namaSekolah} onChange={e=>setFormData({...formData, namaSekolah: e.target.value})} placeholder="SD NEGERI 1 DONGGALA" />
                            </div>
                        </div>
                        <div className="space-y-5">
                            <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-tight">Tahap</label>
                                <select className="w-full p-3.5 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" value={formData.tahap} onChange={e=>setFormData({...formData, tahap: e.target.value})}>
                                <option>Tahap 1</option>
                                <option>Tahap 2</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-tight">Kategori</label>
                                <select className="w-full p-3.5 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" value={formData.kategoriBos} onChange={e=>setFormData({...formData, kategoriBos: e.target.value})}>
                                <option>Bos Reguler</option>
                                <option>Bos Afirmasi</option>
                                <option>Bos Kinerja</option>
                                </select>
                            </div>
                            </div>
                            <div>
                            <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-tight">Pagu Dana (Rp)</label>
                            <input required type="number" className="w-full p-3.5 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" value={formData.pagu} onChange={e=>setFormData({...formData, pagu: e.target.value})} />
                            </div>
                            <div>
                            <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-tight">Belanja Modal (Rp)</label>
                            <input required type="number" className="w-full p-3.5 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" value={formData.belanjaModal} onChange={e=>setFormData({...formData, belanjaModal: e.target.value})} />
                            </div>
                        </div>
                        <div className="md:col-span-2 pt-8 border-t flex flex-col md:flex-row items-center justify-between gap-6">
                            <div className="bg-blue-50 px-8 py-5 rounded-2xl border-2 border-blue-100 flex-1 w-full text-center md:text-left">
                            <p className="text-[11px] font-black text-blue-400 uppercase tracking-widest">Estimasi Total Cair</p>
                            <p className="text-3xl font-black text-blue-700">Rp {(parseFloat(formData.pagu || 0) - parseFloat(formData.belanjaModal || 0)).toLocaleString('id-ID')}</p>
                            </div>
                            <button disabled={loading} className="w-full md:w-auto px-12 py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl hover:bg-blue-800 disabled:opacity-50 active:scale-95 transition-all flex items-center justify-center gap-3 text-lg">
                            {loading ? 'MEMPROSES...' : <><Save size={24}/> SIMPAN DATA</>}
                            </button>
                        </div>
                        </form>
                    </div>
                    )}

                    {currentPage === 'data' && (
                    <div className="bg-white rounded-3xl shadow-xl overflow-hidden border">
                        <div className="overflow-x-auto">
                        <table className="w-full text-left">
                            <thead className="bg-gray-50 text-gray-400 text-[11px] uppercase font-black tracking-widest border-b">
                            <tr>
                                <th className="px-6 py-5">No. Surat</th>
                                <th className="px-6 py-5">Nama Sekolah</th>
                                <th className="px-6 py-5">Kategori</th>
                                <th className="px-6 py-5">Total Cair</th>
                                <th className="px-6 py-5 text-center">Tindakan</th>
                            </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                            {data.filter(i=>i["Nama Sekolah"]?.toString().toLowerCase().includes(searchQuery.toLowerCase())).map((item, idx) => (
                                <tr key={idx} className="hover:bg-blue-50/40 transition-colors">
                                <td className="px-6 py-5 text-xs font-semibold text-gray-400">{item["Nomor Surat"]}</td>
                                <td className="px-6 py-5 font-black uppercase text-gray-800 text-sm tracking-tight">{item["Nama Sekolah"]}</td>
                                <td className="px-6 py-5">
                                    <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black uppercase italic">{item["Kategori BOS"]}</span>
                                </td>
                                <td className="px-6 py-5 font-bold text-gray-900">Rp {parseFloat(item["Total"] || 0).toLocaleString('id-ID')}</td>
                                <td className="px-6 py-5 text-center">
                                    <button onClick={() => printDocument(item)} className="bg-blue-600 text-white px-6 py-2.5 rounded-xl text-xs font-black shadow-md hover:bg-blue-700 active:scale-95 transition-all flex items-center gap-2 mx-auto">
                                    <Printer size={16}/> CETAK PDF
                                    </button>
                                </td>
                                </tr>
                            ))}
                            </tbody>
                        </table>
                        </div>
                    </div>
                    )}
                </main>
                </div>
            );
        };

        // Render aplikasi ke dalam div#root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
